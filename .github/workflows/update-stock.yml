name: Update stock feed

on:
  schedule:
    # 22:00 UTC == 08:00 AEST (UTC+10, Queensland has no DST)
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  update-stock:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install xml2js

      - name: Fetch stock feed
        run: node scripts/fetch-stock.js

      - name: Generate static catalogue pages
        # Reads catalogue-data.json (written above) and regenerates the
        # /category and /product pages + sitemap.xml. Pure Node, no network.
        run: node scripts/build-catalogue-pages.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          # Stage the feed JSON and all generated artefacts. The generator wipes
          # and rebuilds category/ and product/ each run, so `git add -A` over
          # those paths also stages deletions of pages whose products left the
          # feed (clean regenerate — no orphaned/stale pages).
          git add -A catalogue-data.json category product sitemap.xml assets
          if git diff --cached --quiet; then
            echo "No changes — nothing to commit."
          else
            git commit -m "chore: update stock feed + catalogue pages $(date -u +%Y-%m-%d)"
            git push origin HEAD:main
          fi
