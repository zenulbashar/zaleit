name: Weekly clearance campaign

on:
  schedule:
    # 23:00 UTC Sunday == 09:00 AEST Monday (UTC+10, Queensland has no DST)
    - cron: '0 23 * * 0'
  workflow_dispatch:

jobs:
  build-clearance-campaign:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install xml2js

      - name: Build clearance campaign and push Brevo draft
        env:
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
        run: node scripts/build-clearance-campaign.js

      - name: Commit generated email if changed
        # Run even if the previous step failed (e.g. Brevo draft push errored)
        # so the generated HTML is still versioned for manual review.
        if: always()
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          if git diff --quiet -- campaign-clearance.html; then
            echo "No changes to campaign-clearance.html — nothing to commit."
          else
            git add campaign-clearance.html
            git commit -m "chore: update clearance campaign email $(date -u +%Y-%m-%d)"
            git push origin HEAD:main
          fi
